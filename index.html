<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaidFall — Join the Discord</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;background:#111;}
  .rf-page{min-height:100vh;width:100%;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem;font-family:'Barlow',sans-serif;position:relative;overflow:hidden;}
  .rf-bg-glow{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:100%;max-width:600px;height:400px;background:radial-gradient(ellipse at center,rgba(180,20,20,0.2) 0%,transparent 70%);pointer-events:none;}
  .rf-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(42px,12vw,72px);font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:3px;margin:0 0 0.25rem;text-align:center;position:relative;z-index:1;line-height:1;}
  .rf-subtitle{font-size:clamp(14px,4vw,17px);color:#aaa;text-align:center;margin:0 0 2rem;letter-spacing:0.5px;position:relative;z-index:1;}
  .rf-divider{width:48px;height:3px;background:#cc1c1c;margin:0.75rem auto 1.25rem;border-radius:2px;}
  .rf-card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:20px;padding:2rem 1.5rem 1.75rem;width:100%;max-width:420px;text-align:center;position:relative;z-index:1;}
  .rf-card-icon{width:64px;height:64px;background:#5865F2;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
  .rf-card-heading{font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,6vw,26px);font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;margin:0 0 0.5rem;}
  .rf-card-desc{font-size:clamp(13px,3.5vw,15px);color:#888;margin:0 0 1.5rem;line-height:1.65;}
  .rf-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 24px;background:#cc1c1c;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,5vw,20px);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;text-decoration:none;border-radius:12px;border:none;cursor:pointer;transition:background 0.15s,transform 0.1s;}
  .rf-btn:hover{background:#e82222;transform:translateY(-1px);}
  .rf-btn:active{transform:scale(0.98);}
  .rf-tag{display:inline-block;background:#1f1f1f;border:1px solid #2e2e2e;border-radius:20px;padding:5px 14px;font-size:clamp(11px,3vw,13px);color:#777;margin:0 4px 8px;}
  .rf-tags{margin-bottom:1.5rem;}
  .rf-footer{margin-top:1.25rem;font-size:12px;color:#444;text-align:center;position:relative;z-index:1;}
</style>
</head>
<body>
<div class="rf-page">
  <div class="rf-bg-glow"></div>
  <h1 class="rf-title">RaidFall</h1>
  <div class="rf-divider"></div>
  <p class="rf-subtitle">Join the community. Join the raid.</p>
  <div class="rf-card">
    <div class="rf-card-icon">
      <svg width="38" height="38" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <path fill="white" d="M29.9 7.3C27.8 6.3 25.5 5.6 23.1 5.2C22.8 5.7 22.4 6.5 22.2 7.1C19.6 6.7 17.1 6.7 14.5 7.1C14.3 6.5 13.9 5.7 13.6 5.2C11.2 5.6 8.9 6.3 6.8 7.3C2.6 13.5 1.4 19.5 2.0 25.5C4.9 27.6 7.7 28.9 10.5 29.7C11.2 28.7 11.8 27.7 12.3 26.6C11.3 26.2 10.3 25.7 9.4 25.1C9.6 24.9 9.9 24.8 10.1 24.6C15.4 27.1 21.3 27.1 26.5 24.6C26.8 24.8 27.0 25.0 27.3 25.1C26.4 25.7 25.4 26.2 24.4 26.6C24.9 27.7 25.5 28.7 26.2 29.7C29.0 28.9 31.8 27.6 34.7 25.5C35.4 18.5 33.6 12.5 29.9 7.3ZM13.2 21.8C11.6 21.8 10.3 20.3 10.3 18.5C10.3 16.7 11.6 15.2 13.2 15.2C14.9 15.2 16.2 16.7 16.1 18.5C16.1 20.3 14.8 21.8 13.2 21.8ZM23.5 21.8C21.9 21.8 20.6 20.3 20.6 18.5C20.6 16.7 21.9 15.2 23.5 15.2C25.1 15.2 26.4 16.7 26.4 18.5C26.4 20.3 25.1 21.8 23.5 21.8Z"/>
      </svg>
    </div>
    <h2 class="rf-card-heading">Join the Discord</h2>
    <p class="rf-card-desc">Connect with the RaidFall community — get updates, early access, and talk strategy with other players.</p>
    <div class="rf-tags">
      <span class="rf-tag">Updates</span>
      <span class="rf-tag">Community</span>
      <span class="rf-tag">Early access</span>
    </div>
    <a class="rf-btn" href="https://discord.gg/WQU5vw3Qxr" target="_blank">Join Discord</a>
  </div>
  <p class="rf-footer">raidfall.github.io</p>
</div>
</body>
</html>
