<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap');
  .rf-page{min-height:100vh;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;font-family:'Barlow',sans-serif;position:relative;overflow:hidden;}
  .rf-bg-glow{position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse at center,rgba(180,20,20,0.18) 0%,transparent 70%);pointer-events:none;}
  .rf-title{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:2px;margin:0 0 0.25rem;text-align:center;position:relative;z-index:1;}
  .rf-subtitle{font-size:15px;color:#aaa;text-align:center;margin:0 0 2.5rem;letter-spacing:0.5px;position:relative;z-index:1;}
  .rf-divider{width:48px;height:3px;background:#cc1c1c;margin:0.75rem auto 1.5rem;border-radius:2px;}
  .rf-card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:16px;padding:2rem 2rem 1.75rem;max-width:380px;width:100%;text-align:center;position:relative;z-index:1;}
  .rf-card-icon{width:56px;height:56px;background:#5865F2;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
  .rf-card-heading{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;margin:0 0 0.4rem;}
  .rf-card-desc{font-size:14px;color:#888;margin:0 0 1.75rem;line-height:1.6;}
  .rf-btn{display:block;width:100%;padding:14px 24px;background:#cc1c1c;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;text-decoration:none;border-radius:10px;border:none;cursor:pointer;box-sizing:border-box;transition:background 0.15s,transform 0.1s;}
  .rf-btn:hover{background:#e82222;transform:translateY(-1px);}
  .rf-btn:active{transform:scale(0.98);}
  .rf-footer{margin-top:1.5rem;font-size:12px;color:#555;text-align:center;position:relative;z-index:1;}
  .rf-tag{display:inline-block;background:#1f1f1f;border:1px solid #2e2e2e;border-radius:20px;padding:4px 12px;font-size:12px;color:#777;margin:0 4px 8px;}
  .rf-tags{margin-bottom:1.75rem;}
</style>

    <h2 class="rf-card-heading">Join the Discord</h2>
